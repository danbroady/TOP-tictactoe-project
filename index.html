<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script src="./main.js"></script>
    <link href="./styles.css" rel="stylesheet">
    <link href="./images/TTTicon.svg" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet"></head>
<body>
    <header>
        <h1>Tic Tac Toe</h1>
    </header>

    <main>
        <h2>Start game: Player 1</h2>
        <div class="game-grid">
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
        </div>
        <button>Restart</button>
    </main>

    <footer>Created by <a href="https://github.com/danbroady" target="_blank">Dan</a></footer>
</body>
</html>
